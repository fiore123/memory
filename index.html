              const reader = new FileReader();
              reader.onload = (event) => {
                  const img = new Image();
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      const size = Math.min(img.width, img.height);
                      canvas.width = 256; canvas.height = 256;
                      const ctx = canvas.getContext('2d');
                      ctx.drawImage(img, (img.width - size)/2, (img.height - size)/2, size, size, 0, 0, 256, 256);
                      updateProfile({ avatarUrl: canvas.toDataURL('image/jpeg', 0.8) });
                  };
                  img.src = event.target.result;
              };
              reader.readAsDataURL(file);
          };

          const playSound = useCallback((type) => {
            try {
              if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
              const ctx = audioCtxRef.current;
              if (ctx.state === 'suspended') ctx.resume();
              const osc = ctx.createOscillator(); const gain = ctx.createGain();
              osc.connect(gain); gain.connect(ctx.destination); const now = ctx.currentTime;

              if (activeSoundPack === 'retro') {
                osc.type = 'square';
                if (type === 'tap') { osc.frequency.setValueAtTime(600, now); gain.gain.setValueAtTime(0.08, now); osc.start(now); osc.stop(now + 0.08); }
                else if (type === 'success') { osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.2); }
                else if (type === 'error') { osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.3); }
              } else if (activeSoundPack === 'scifi') {
                if (type === 'tap') { osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.1); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.1); }
                else if (type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.linearRampToValueAtTime(1600, now + 0.2); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.2); }
                else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(50, now + 0.4); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.4); }
              } else if (activeSoundPack === 'lofi') {
                osc.type = 'triangle';
                if (type === 'tap') { osc.frequency.setValueAtTime(300, now); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); }
                else if (type === 'success') { osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(500, now + 0.2); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
                else if (type === 'error') { osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); }
              } else if (activeSoundPack === 'mechanical') {
                osc.type = 'square';
                if (type === 'tap') { osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.02); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03); osc.start(now); osc.stop(now + 0.03); }
                else if (type === 'success') { osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.1); }
                else if (type === 'error') { osc.frequency.setValueAtTime(200, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
              } else if (activeSoundPack === 'magic') {
                osc.type = 'sine';
                if (type === 'tap') { osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
                else if (type === 'success') { osc.frequency.setValueAtTime(1000, now); osc.frequency.linearRampToValueAtTime(2000, now + 0.3); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8); osc.start(now); osc.stop(now + 0.8); }
                else if (type === 'error') { osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.5); gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
              } else if (activeSoundPack === 'glitch') {
                osc.type = 'sawtooth';
                if (type === 'tap') { osc.frequency.setValueAtTime(Math.random()*1000+200, now); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.05); }
                else if (type === 'success') { osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(100, now+0.05); osc.frequency.setValueAtTime(1200, now+0.1); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.15); }
                else if (type === 'error') { osc.frequency.setValueAtTime(100, now); osc.frequency.setValueAtTime(800, now+0.1); osc.frequency.setValueAtTime(50, now+0.2); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.3); }
              } else {
                if (type === 'tap') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.05); }
                else if (type === 'success') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.15); }
                else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3); gain.gain.setValueAtTime(0.1, now); osc.start(now); osc.stop(now + 0.3); }
              }
            } catch (e) {}
            if (navigator.vibrate) {
              if (type === 'tap') navigator.vibrate(10);
              else if (type === 'success') navigator.vibrate([30, 50, 30]);
              else if (type === 'error') navigator.vibrate([50, 50, 50]);
            }
          }, [activeSoundPack]);

          const buyItem = (type, id, cost) => {
            if (coins >= cost) {
              setCoins(c => { const nc = c - cost; localStorage.setItem('memory-coins', nc); return nc; });
              playSound('success');
              if (type === 'theme') {
                const arr = [...unlockedThemes, id]; setUnlockedThemes(arr); localStorage.setItem('memory-themes', JSON.stringify(arr));
                setActiveTheme(id); localStorage.setItem('memory-active-theme', id);

              } else {
                const arr = [...unlockedSounds, id]; setUnlockedSounds(arr); localStorage.setItem('memory-sounds', JSON.stringify(arr));
                setActiveSoundPack(id); localStorage.setItem('memory-active-sound', id);
              }
            } else playSound('error');
          };

          const equipItem = (type, id) => {
            playSound('tap');
            if (type === 'theme') { setActiveTheme(id); localStorage.setItem('memory-active-theme', id); } 
            else if (type === 'sound') { setActiveSoundPack(id); localStorage.setItem('memory-active-sound', id); }

          const openPreview = (themeId) => { playSound('tap'); setPreviewThemeId(themeId); setGameState(STATES.PREVIEW); };

          const generateNumber = useCallback((digits) => {
            const min = Math.pow(10, digits - 1); const max = Math.pow(10, digits) - 1;

          const generateDistractions = useCallback((diffParam = difficulty) => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%'; const dist = [];
            for (let i = 0; i < diffParam * 2; i++) {
              dist.push({ id: i, char: chars.charAt(Math.floor(Math.random() * chars.length)), top: `${Math.random() * 80 + 10}%`, left: `${Math.random() * 80 + 10}%`, scale: Math.random() * 1.5 + 0.5, opacity: Math.random() * 0.5 + 0.2 });
            } return dist;
          }, [difficulty]);

          const startRound = useCallback((resetScore = false, diffOverride = difficulty) => {
            updateStreak(); setShowLevelUp(false);
            if (resetScore) {

              setStats(prev => {
                  const newStats = { ...prev, played: prev.played + 1, modes: { ...prev.modes } };
                  newStats.modes[gameMode] = (newStats.modes[gameMode] || 0) + 1;
                  localStorage.setItem('memory-stats', JSON.stringify(newStats)); return newStats;

            }
            setTargetNumber(generateNumber(diffOverride));
            if (gameMode === 'EXTREME') setDistractions(generateDistractions(diffOverride));
            setUserInput(''); setGameState(STATES.READY);
          }, [difficulty, gameMode, generateNumber, generateDistractions, updateStreak]);

          useEffect(() => {
            if (gameMode !== 'TIME_ATTACK' || ![STATES.READY, STATES.MEMORIZE, STATES.INPUT].includes(gameState)) return;
            if (timeLeft <= 0) { setIsCorrect(false); setGameState(STATES.RESULT); playSound('error'); return; }
            const t = setInterval(() => setTimeLeft(x => x - 1), 1000); return () => clearInterval(t);
          }, [gameMode, gameState, timeLeft, playSound]);

          useEffect(() => {
            let timer;
            if (gameState === STATES.READY) timer = setTimeout(() => setGameState(STATES.MEMORIZE), 800);
            else if (gameState === STATES.MEMORIZE) {
              const baseTime = difficulty * 50 + 150;
              const progressiveTime = Math.max(baseTime - (score * 5), gameMode === 'EXTREME' ? 250 : 100); 
              timer = setTimeout(() => setGameState(STATES.INPUT), progressiveTime);
            }
            return () => clearTimeout(timer);
          }, [gameState, difficulty, score, gameMode]);

          useEffect(() => {
            if (gameState === STATES.INPUT && userInput.length === difficulty) {
              const autoSubmitTimer = setTimeout(() => checkResult(), 150); return () => clearTimeout(autoSubmitTimer);
            }
          }, [userInput, gameState, difficulty]);

          const checkResult = useCallback(() => {
            const expected = gameMode === 'REVERSE' ? targetNumber.split('').reverse().join('') : targetNumber;
            const correct = userInput === expected;
            
            if (correct) {
              playSound('success'); const newScore = score + 1; setScore(newScore);
              let xpEarned = difficulty * 8; let coinsEarned = difficulty;
              if(gameMode === 'REVERSE') { xpEarned += 10; coinsEarned += 2; }
              if(gameMode === 'EXTREME') { xpEarned += 20; coinsEarned += 4; }
              if(gameMode === 'TIME_ATTACK') { xpEarned += 5; }
              
              const oldLevel = getLevelFromXp(xp);
              const newXp = xp + xpEarned; setXp(newXp); localStorage.setItem('memory-xp', newXp);
              if (getLevelFromXp(newXp) > oldLevel) {
                 coinsEarned += getLevelFromXp(newXp) * 50; setLeveledUpTo(getLevelFromXp(newXp)); setShowLevelUp(true);
                 setTimeout(() => playSound('magic'), 300);
              }
              setCoins(c => { const nc = c + coinsEarned; localStorage.setItem('memory-coins', nc); return nc; });

              if (newScore > bestScore) {
                  setBestScore(newScore); 
                  localStorage.setItem(`memory-best-${gameMode}-${difficulty}`, newScore.toString());
                  uploadScoreToFirebase(newScore, gameMode, difficulty);
              }

              const speedMs = Math.max((difficulty * 50 + 150) - (score * 5), gameMode === 'EXTREME' ? 250 : 100);
              setStats(prev => {
                  const newStats = { ...prev, won: prev.won + 1 };
                  if (!prev.fastestTime || speedMs < prev.fastestTime) newStats.fastestTime = speedMs;
                  localStorage.setItem('memory-stats', JSON.stringify(newStats)); return newStats;
              });

              if (gameMode === 'TIME_ATTACK' && timeLeft > 0) { startRound(false, difficulty); return; }
            } else playSound('error');
            
            setIsCorrect(correct); setGameState(STATES.RESULT);
          }, [userInput, targetNumber, score, bestScore, difficulty, gameMode, timeLeft, playSound, startRound, xp, fbUser, profile]);

          const handleKeyPress = useCallback((k) => {
            if (gameState !== STATES.INPUT && gameState !== STATES.PREVIEW) return;
            playSound('tap'); if (gameState === STATES.PREVIEW) return; 
            if (k === 'backspace') setUserInput(p => p.slice(0, -1));
            else if (k === 'submit') { if (userInput.length > 0) checkResult(); }
            else if (userInput.length < difficulty) setUserInput(p => p + k);
          }, [gameState, userInput.length, difficulty, checkResult, playSound]);

          const currentLevelXp = Math.pow(currentLevel - 1, 2) * 50;
          const nextLevelXp = Math.pow(currentLevel, 2) * 50;
          const xpProgressPercentage = ((xp - currentLevelXp) / (nextLevelXp - currentLevelXp)) * 100;
          const favoriteMode = Object.keys(stats.modes).reduce((a, b) => stats.modes[a] > stats.modes[b] ? a : b, 'CLASSIC');
          const winRate = stats.played > 0 ? Math.round((stats.won / stats.played) * 100) : 0;

          const AvatarDisplay = ({ sizeClass = "w-10 h-10", iconSize = "text-[20px]" }) => (
              profile.avatarUrl ? ( <img src={profile.avatarUrl} alt="Avatar" className={`${sizeClass} rounded-full object-cover border-2 ${theme.border}`} /> ) 
              : ( <div className={`flex items-center justify-center ${sizeClass} rounded-full ${profile.avatarBg} ${profile.avatarText} shadow-md border-2 ${theme.border}`}><i className={`fa-solid ${profile.avatarIcon} ${iconSize}`}></i></div> )
          );

          const Numpad = ({ isPreview = false }) => (
            <div className="grid grid-cols-3 gap-3 w-full max-w-xs mx-auto mt-8">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => <button key={num} onClick={() => handleKeyPress(num.toString())} className={`${theme.card} ${theme.border} active:scale-95 ${theme.text} text-3xl font-semibold py-4 rounded-2xl shadow-sm transition-all h-20 ${isPreview ? 'opacity-80' : ''}`}>{num}</button>)}
              <button onClick={() => handleKeyPress('backspace')} className={`${theme.card} ${theme.border} border-red-900/40 active:scale-95 text-red-500 py-4 rounded-2xl shadow-sm transition-all h-20 ${isPreview ? 'opacity-80' : ''}`}><i className="fa-solid fa-delete-left text-[32px]"></i></button>
              <button onClick={() => handleKeyPress('0')} className={`${theme.card} ${theme.border} active:scale-95 ${theme.text} text-3xl font-semibold py-4 rounded-2xl shadow-sm transition-all h-20 ${isPreview ? 'opacity-80' : ''}`}>0</button>
              <button onClick={() => handleKeyPress('submit')} disabled={!isPreview && userInput.length === 0} className={`py-4 rounded-2xl shadow-sm transition-all h-20 active:scale-95 ${isPreview || userInput.length > 0 ? `${theme.primary} ${theme.primaryActive} ${theme.btnText}` : `${theme.card} ${theme.muted} cursor-not-allowed opacity-50`}`}><i className="fa-solid fa-check text-[32px]"></i></button>
            </div>
          );

          return (
            <div className={`min-h-screen ${theme.bg} ${theme.text} flex flex-col items-center justify-center p-4 font-sans select-none overscroll-none relative transition-colors duration-500`}>
              
              {[STATES.READY, STATES.MEMORIZE, STATES.INPUT, STATES.RESULT, STATES.PREVIEW].includes(gameState) && (
                <div className="absolute top-8 left-0 right-0 flex justify-between px-6 items-start z-10">

                  {gameMode === 'TIME_ATTACK' && gameState !== STATES.PREVIEW && <div className={`font-mono text-2xl font-bold ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : theme.text}`}>00:{timeLeft.toString().padStart(2, '0')}</div>}
                  <div className="flex flex-col items-end">

                    <div className={`mt-2 font-medium flex items-center gap-1 ${score >= 3 && gameMode !== 'TIME_ATTACK' ? 'text-orange-400 animate-pulse' : theme.text}`}>{score >= 3 && gameMode !== 'TIME_ATTACK' && <i className="fa-solid fa-fire text-[18px] text-orange-500"></i>}<span className={`font-bold text-xl ${score >= 3 && gameMode !== 'TIME_ATTACK' ? 'text-orange-500' : theme.highlight}`}>{score}</span> pts</div>
                  </div>

              {gameState === STATES.MENU && (
                <div className="w-full max-w-sm flex flex-col items-center animate-in fade-in zoom-in duration-300 pb-10 mt-6">
                  <div className="w-full flex justify-between items-center mb-6 px-2">

                      <button onClick={() => { playSound('tap'); setGameState(STATES.STORE); }} className={`w-10 h-10 flex items-center justify-center ${theme.card} ${theme.border} rounded-full ${theme.text} active:scale-90 transition-all`}><i className="fa-solid fa-cart-shopping text-[20px]"></i></button>

                        <i className={`fa-solid ${mode === 'CLASSIC' ? 'fa-play' : mode === 'REVERSE' ? 'fa-arrow-right-arrow-left' : mode === 'TIME_ATTACK' ? 'fa-stopwatch' : 'fa-skull'} text-[16px]`}></i> {MODES[mode]}
                      </button>

                  <div className="w-full space-y-3">

                      </button>

                  </div>

              {gameState === STATES.PROFILE && (
                <div className="w-full max-w-md flex flex-col animate-in fade-in duration-300 pb-10 mt-6 h-full">
                  <div className="w-full flex items-center gap-4 mb-8 px-2">
                     <button onClick={() => { playSound('tap'); setGameState(STATES.MENU); }} className={`w-10 h-10 flex items-center justify-center ${theme.card} rounded-full active:scale-90`}><i className="fa-solid fa-arrow-left text-[20px]"></i></button>
                     <h2 className="text-2xl font-bold flex-1">Meu Perfil</h2>
                  </div>
                  <div className="flex flex-col items-center w-full px-4 mb-8">
                     <div className="relative mb-4 avatar-container cursor-pointer" onClick={() => fileInputRef.current?.click()}>
                        <AvatarDisplay sizeClass="w-32 h-32" iconSize="text-[60px]" />
                        <div className="absolute inset-0 bg-black/60 rounded-full flex flex-col items-center justify-center avatar-upload-overlay"><i className="fa-solid fa-camera text-white text-[24px] mb-1"></i><span className="text-white text-xs font-bold uppercase">Mudar Foto</span></div>
                        <input type="file" accept="image/*" ref={fileInputRef} onChange={handlePhotoUpload} className="hidden" />
                     </div>
                     <div className="flex items-center gap-2 mb-2 w-full max-w-[250px]">
                        <input type="text" value={profile.nickname} onChange={(e) => updateProfile({ nickname: e.target.value.replace(/[^a-zA-Z0-9_]/g, '').substring(0, 15) })} className={`w-full text-center text-2xl font-bold bg-transparent border-b-2 ${theme.border} focus:border-current ${theme.highlight} focus:outline-none px-2 py-1 transition-colors`} placeholder="Teu Nickname" />
                        <i className={`fa-solid fa-pen text-[14px] ${theme.muted}`}></i>
                     </div>
                     <select value={profile.title} onChange={(e) => updateProfile({ title: e.target.value })} className={`mt-2 bg-transparent text-sm font-bold uppercase tracking-widest ${theme.highlight} focus:outline-none text-center cursor-pointer appearance-none`}>
                        {getAvailableTitles(currentLevel).map(t => <option key={t} value={t} className="bg-gray-900 text-white">{t}</option>)}
                     </select>
                  </div>
                  <div className="w-full px-4 mb-8">
                     <p className={`text-xs font-bold uppercase tracking-wider ${theme.muted} mb-3 ml-1`}>Avatares Predefinidos</p>
                     <div className="flex gap-3 overflow-x-auto pb-2" style={{ scrollbarWidth: 'none' }}>
                         {PRESET_AVATARS.map((av, i) => (
                             <button key={i} onClick={() => updateProfile({ avatarUrl: null, avatarIcon: av.icon, avatarBg: av.bg, avatarText: av.text })} className={`flex-shrink-0 w-14 h-14 rounded-full flex items-center justify-center ${av.bg} ${av.text} border-4 transition-all ${!profile.avatarUrl && profile.avatarIcon === av.icon ? 'border-white scale-110 shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'border-transparent opacity-60 hover:opacity-100'} cursor-pointer`}><i className={`fa-solid ${av.icon} text-[24px]`}></i></button>
                         ))}
                     </div>
                  </div>
                  <div className="w-full px-4">
                     <p className={`text-xs font-bold uppercase tracking-wider ${theme.muted} mb-3 ml-1`}>As Minhas Estatísticas</p>
                     <div className="grid grid-cols-2 gap-3">
                        <div className={`${theme.card} ${theme.border} border p-4 rounded-2xl flex flex-col items-center text-center`}><i className={`fa-solid fa-gamepad text-[24px] ${theme.muted} mb-2`}></i><span className="text-2xl font-black">{stats.played}</span><span className={`text-[10px] uppercase font-bold ${theme.muted}`}>Partidas</span></div>
                        <div className={`${theme.card} ${theme.border} border p-4 rounded-2xl flex flex-col items-center text-center`}><i className={`fa-solid fa-bullseye text-[24px] ${winRate > 50 ? 'text-green-500' : theme.muted} mb-2`}></i><span className={`text-2xl font-black ${winRate > 50 ? 'text-green-500' : ''}`}>{winRate}%</span><span className={`text-[10px] uppercase font-bold ${theme.muted}`}>Taxa Vitória</span></div>
                        <div className={`${theme.card} ${theme.border} border p-4 rounded-2xl flex flex-col items-center text-center`}><i className={`fa-solid fa-bolt text-[24px] text-yellow-500 mb-2`}></i><span className="text-2xl font-black text-yellow-500">{stats.fastestTime ? `${stats.fastestTime}ms` : '---'}</span><span className={`text-[10px] uppercase font-bold ${theme.muted}`}>Mais Rápido</span></div>
                        <div className={`${theme.card} ${theme.border} border p-4 rounded-2xl flex flex-col items-center text-center`}><i className={`fa-solid fa-heart text-[24px] text-pink-500 mb-2`}></i><span className="text-lg font-black text-pink-500 mt-1">{MODES[favoriteMode]}</span><span className={`text-[10px] uppercase font-bold ${theme.muted} mt-1`}>Modo Favorito</span></div>
                     </div>
                  </div>
                </div>
              )}

              {gameState === STATES.STORE && (
                <div className="w-full max-w-md flex flex-col items-center animate-in fade-in duration-300 pb-10 mt-4">
                  <div className="w-full flex justify-between items-center mb-6 px-2">
                     <button onClick={() => { playSound('tap'); setGameState(STATES.MENU); }} className={`w-10 h-10 flex items-center justify-center ${theme.card} rounded-full`}><i className="fa-solid fa-xmark text-[24px]"></i></button>
                     <h2 className="text-2xl font-bold">Loja</h2>
                     <div className="flex items-center gap-1 bg-yellow-400/20 px-3 py-1 rounded-full text-yellow-400 font-bold">{coins} <i className="fa-solid fa-coins text-[16px]"></i></div>
                  </div>
                  <div className={`flex w-full p-1 ${theme.card} ${theme.border} rounded-2xl mb-6`}>
                    <button onClick={() => { playSound('tap'); setStoreTab('themes'); }} className={`flex-1 py-2 font-bold rounded-xl flex items-center justify-center gap-2 ${storeTab === 'themes' ? 'bg-blue-600 text-white' : theme.muted}`}><i className="fa-solid fa-palette text-[18px]"></i> Temas</button>
                    <button onClick={() => { playSound('tap'); setStoreTab('sounds'); }} className={`flex-1 py-2 font-bold rounded-xl flex items-center justify-center gap-2 ${storeTab === 'sounds' ? 'bg-blue-600 text-white' : theme.muted}`}><i className="fa-solid fa-music text-[18px]"></i> Sons</button>
                  </div>
                  <div className="w-full space-y-4 px-2 overflow-y-auto" style={{maxHeight: '65vh'}}>
                    {storeTab === 'themes' && Object.values(THEMES).map((t) => {
                      const isUnlocked = unlockedThemes.includes(t.id); const isActive = activeTheme === t.id;
                      return (
                        <div key={t.id} className={`w-full p-4 rounded-3xl border-2 ${isActive ? 'border-green-500' : 'border-gray-800'} bg-gray-900 flex flex-col`}>
                          <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-3"><div className={`w-10 h-10 rounded-full border-2 border-white/20 flex items-center justify-center ${t.primary}`}><span className={`${t.btnText} text-xs font-black`}>Ab</span></div><div><h3 className="font-bold text-lg text-white">{t.name}</h3>{!isUnlocked && <p className="text-yellow-400 text-sm font-medium flex items-center gap-1"><i className="fa-solid fa-coins text-[14px]"></i> {t.cost}</p>}</div></div>
                            {isActive && <span className="bg-green-500 text-black text-xs font-bold px-2 py-1 rounded-md">EM USO</span>}
                          </div>
                          <div className="flex gap-2 mt-2">
                            <button onClick={() => openPreview(t.id)} className="flex-1 py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white active:scale-95"><i className="fa-solid fa-eye text-[18px]"></i> Ver</button>
                            {isUnlocked ? <button disabled={isActive} onClick={() => equipItem('theme', t.id)} className={`flex-[2] py-3 rounded-xl font-bold transition-all ${isActive ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : 'bg-blue-600 active:bg-blue-700 text-white active:scale-95'}`}>{isActive ? 'Equipado' : 'Equipar'}</button> : <button onClick={() => buyItem('theme', t.id, t.cost)} className={`flex-[2] py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 active:scale-95 ${coins >= t.cost ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>{coins >= t.cost ? <><i className="fa-solid fa-lock-open text-[18px]"></i> Comprar</> : <i className="fa-solid fa-lock text-[18px]"></i>}</button>}
                          </div>
                        </div>
                      )
                    })}
                    {storeTab === 'sounds' && Object.values(SOUND_PACKS).map((s) => {
                      const isUnlocked = unlockedSounds.includes(s.id); const isActive = activeSoundPack === s.id;
                      return (
                        <div key={s.id} className={`w-full p-4 rounded-3xl border-2 ${isActive ? 'border-purple-500' : 'border-gray-800'} bg-gray-900 flex flex-col`}>
                          <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full border-2 border-gray-700 bg-gray-800 flex items-center justify-center text-purple-400"><i className="fa-solid fa-music text-[18px]"></i></div><div><h3 className="font-bold text-lg text-white">{s.name}</h3><p className="text-gray-400 text-xs">{s.desc}</p>{!isUnlocked && <p className="text-yellow-400 text-sm font-medium flex items-center gap-1 mt-1"><i className="fa-solid fa-coins text-[14px]"></i> {s.cost}</p>}</div></div>
                            {isActive && <span className="bg-purple-500 text-white text-xs font-bold px-2 py-1 rounded-md">ATIVO</span>}
                          </div>
                          {isUnlocked ? <button disabled={isActive} onClick={() => equipItem('sound', s.id)} className={`w-full py-3 rounded-xl font-bold transition-all ${isActive ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : 'bg-blue-600 active:bg-blue-700 text-white active:scale-95'}`}>{isActive ? 'Selecionado' : 'Selecionar Som'}</button> : <button onClick={() => buyItem('sound', s.id, s.cost)} className={`w-full py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 active:scale-95 ${coins >= s.cost ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>{coins >= s.cost ? <><i className="fa-solid fa-lock-open text-[18px]"></i> Comprar</> : <i className="fa-solid fa-lock text-[18px]"></i>}</button>}
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}

              {gameState === STATES.PREVIEW && previewThemeId && (
                <div className="w-full max-w-sm flex flex-col items-center animate-in slide-in-from-bottom-8 duration-300 relative h-full justify-center">
                  <h2 className={`text-xl mb-6 font-medium ${theme.muted}`}>A pré-visualizar</h2>
                  <div className="flex justify-center gap-2 mb-4 w-full px-4">{['4', '0', '9', ''].map((char, i) => <div key={i} className={`h-16 flex-1 flex items-center justify-center text-4xl font-bold rounded-xl border-b-4 ${char ? `border-current ${theme.highlight} ${theme.card} shadow-inner` : `${theme.border}`}`}>{char}</div>)}</div>
                  <Numpad isPreview={true} />
                  <div className={`absolute bottom-4 left-4 right-4 ${theme.card} ${theme.border} border-2 rounded-3xl p-4 shadow-2xl flex items-center justify-between`}>
                     <div className="flex flex-col"><span className="text-xs font-bold uppercase opacity-70">Tema</span><span className="font-black text-lg">{THEMES[previewThemeId].name}</span></div>
                     <button onClick={() => buyItem('theme', previewThemeId, THEMES[previewThemeId].cost)} className={`px-6 py-3 rounded-xl font-bold flex items-center gap-2 active:scale-95 ${coins >= THEMES[previewThemeId].cost ? 'bg-yellow-500 text-black' : 'bg-gray-800 text-gray-500'}`}>{coins >= THEMES[previewThemeId].cost ? <><i className="fa-solid fa-lock-open text-[18px]"></i> {THEMES[previewThemeId].cost}</> : <><i className="fa-solid fa-lock text-[18px]"></i> {THEMES[previewThemeId].cost}</>}</button>
                  </div>
                </div>
              )}

              {gameState === STATES.LEADERBOARD && (
                <div className="w-full max-w-md flex flex-col items-center animate-in fade-in duration-300 pb-10 mt-4 h-[90vh]">
                  <div className="w-full flex justify-between items-center mb-8 px-2">
                     <button onClick={() => { playSound('tap'); setGameState(STATES.MENU); }} className={`w-10 h-10 flex items-center justify-center ${theme.card} rounded-full`}><i className="fa-solid fa-arrow-left text-[20px]"></i></button>
                     <h2 className="text-2xl font-bold flex items-center gap-2"><i className="fa-solid fa-globe text-[20px] text-blue-400"></i> Global</h2>
                     <div className="w-10"></div>
                  </div>
                  <div className="w-full flex gap-2 mb-4 px-2">
                     <select value={lbModeFilter} onChange={(e) => setLbModeFilter(e.target.value)} className={`flex-1 bg-gray-900 border border-gray-700 text-white text-sm rounded-xl px-3 py-2 font-bold focus:outline-none appearance-none text-center cursor-pointer`}>
                        {Object.keys(MODES).map(k => <option key={k} value={k}>{MODES[k]}</option>)}
                     </select>
                     <select value={lbDiffFilter} onChange={(e) => setLbDiffFilter(Number(e.target.value))} className={`flex-1 bg-gray-900 border border-gray-700 text-white text-sm rounded-xl px-3 py-2 font-bold focus:outline-none appearance-none text-center cursor-pointer`}>
                        {Object.keys(DIFFS).map(k => <option key={k} value={k}>{DIFFS[k]}</option>)}
                     </select>
                  </div>
                  <div className="w-full rounded-3xl overflow-hidden bg-gray-900 border border-gray-800 p-2 flex-1 flex flex-col relative">
                    {dbError && (
                        <div className="absolute inset-0 bg-gray-950/90 z-20 flex flex-col items-center justify-center p-6 text-center">
                            <i className="fa-solid fa-triangle-exclamation text-[48px] text-red-500 mb-4"></i>
                            <h3 className="text-xl font-bold text-white mb-2">Acesso Negado</h3>
                            <p className="text-gray-400 text-xs mb-4">O banco de dados bloqueou a leitura.<br/>Vá ao Firebase &gt; Firestore &gt; Rules e defina:<br/><br/><code className="bg-black p-2 rounded text-green-400">allow read, write: if true;</code></p>
                            <button onClick={() => setGameState(STATES.MENU)} className="bg-red-600 text-white font-bold py-2 px-6 rounded-xl">Voltar</button>
                        </div>
                    )}
                    {authError && (
                        <div className="absolute inset-0 bg-gray-950/90 z-20 flex flex-col items-center justify-center p-6 text-center">
                            <i className="fa-solid fa-user-xmark text-[48px] text-red-500 mb-4"></i>
                            <h3 className="text-xl font-bold text-white mb-2">Erro de Autenticação</h3>
                            <p className="text-gray-400 text-sm mb-4">Ative o método "Anónimo" na aba Authentication do Firebase.</p>
                            <button onClick={() => setGameState(STATES.MENU)} className="bg-red-600 text-white font-bold py-2 px-6 rounded-xl">Voltar</button>
                        </div>
                    )}
                    <div className="flex justify-between text-xs text-gray-500 font-bold uppercase px-4 pt-2 pb-4 border-b border-gray-800"><span>Jogador</span><span>Score</span></div>
                    <div className="overflow-y-auto flex-1 px-2 pb-2 space-y-2 mt-3" style={{ scrollbarWidth: 'none' }}>
                        {fbUser && !dbError ? (
                            filteredRanking.length > 0 ? (
                                filteredRanking.map((user, i) => (
                                    <div key={i} className={`flex justify-between items-center p-3 rounded-xl ${user.userId === fbUser.uid ? 'bg-blue-900/40 border border-blue-500/50 shadow-inner' : 'bg-gray-800'}`}>
                                        <div className="flex items-center gap-3">
                                            <span className={`font-black w-5 text-center ${i === 0 ? 'text-yellow-400 text-lg drop-shadow-[0_0_5px_yellow]' : i === 1 ? 'text-gray-300' : i === 2 ? 'text-amber-600' : 'text-gray-500 text-xs'}`}>{i < 3 ? <i className="fa-solid fa-medal"></i> : `#${i+1}`}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center border border-gray-600 ${user.avatarBg || 'bg-gray-700'} ${user.avatarText || 'text-white'} overflow-hidden`}>
                                                {user.avatarUrl ? <img src={user.avatarUrl} alt="Avatar" className="w-full h-full object-cover" /> : <i className={`fa-solid ${user.avatarIcon || 'fa-user'} text-[12px]`}></i>}
                                            </div>
                                            <div className="flex flex-col"><span className={`font-bold text-sm ${user.userId === fbUser.uid ? 'text-blue-300' : 'text-white'}`}>{user.nickname} {user.userId === fbUser.uid && '(Tu)'}</span></div>
                                        </div>
                                        <span className="font-mono text-blue-400 font-black text-lg">{user.score}</span>
                                    </div>
                                ))
                            ) : ( <div className="text-center text-gray-500 pt-10 font-bold"><i className="fa-solid fa-ghost text-[40px] mb-4 opacity-50 block"></i>Sem recordes aqui.<br/>Sê o primeiro!</div> )
                        ) : !dbError && !authError ? ( <div className="text-center text-gray-500 pt-10 font-bold"><i className="fa-solid fa-spinner fa-spin text-[40px] mb-4 block"></i>A ligar aos servidores mundiais...</div> ) : null}
                    </div>
                  </div>
                </div>
              )}

              {gameState === STATES.READY && <div className="flex flex-col items-center"><div className={`w-16 h-16 border-4 ${theme.border} border-t-current rounded-full animate-spin mb-6 ${theme.highlight}`}></div><h2 className={`text-2xl font-bold tracking-widest uppercase ${theme.muted}`}>Atenção</h2></div>}
              {gameState === STATES.MEMORIZE && (
                <div className="flex flex-col items-center justify-center w-full max-w-sm h-64 relative">
                  {gameMode === 'EXTREME' && distractions.map(dist => <div key={dist.id} style={{ top: dist.top, left: dist.left, transform: `scale(${dist.scale})`, opacity: dist.opacity }} className="absolute text-red-500 font-mono font-black animate-pulse blur-[1px] select-none pointer-events-none">{dist.char}</div>)}
                  <div className={`text-7xl sm:text-8xl font-black tracking-widest drop-shadow-[0_0_20px_rgba(255,255,255,0.3)] animate-in fade-in zoom-in-110 duration-100 ${theme.text} ${gameMode === 'EXTREME' ? 'animate-bounce' : ''}`}>{targetNumber}</div>
                </div>
              )}
              {gameState === STATES.INPUT && (
                <div className="w-full max-w-sm flex flex-col items-center animate-in slide-in-from-bottom-8 duration-300">
                  <h2 className={`text-xl mb-6 font-medium text-center ${gameMode === 'REVERSE' ? 'text-orange-400 animate-bounce' : gameMode === 'EXTREME' ? 'text-red-500 font-bold uppercase tracking-widest' : theme.muted}`}>{gameMode === 'REVERSE' ? 'De trás para a frente!' : gameMode === 'EXTREME' ? 'Sobrevive!' : 'Qual era o número?'}</h2>
                  <div className="flex justify-center gap-2 mb-4 w-full px-4">{Array.from({ length: difficulty }).map((_, i) => <div key={i} className={`h-16 flex-1 flex items-center justify-center text-4xl font-bold rounded-xl border-b-4 transition-all ${userInput[i] ? `border-current ${theme.highlight} ${theme.card} shadow-inner` : `${theme.border}`}`}>{userInput[i] || ''}</div>)}</div>
                  <Numpad />
                </div>
              )}
              {gameState === STATES.RESULT && (
                <div className="w-full max-w-sm flex flex-col items-center text-center animate-in fade-in zoom-in-95 duration-300 mt-8">
                  {showLevelUp && <div className="absolute top-0 w-full flex justify-center z-50 animate-in slide-in-from-top-10 fade-in duration-500"><div className="bg-yellow-400 text-black font-black px-6 py-3 rounded-full border-2 border-yellow-200 shadow-[0_0_30px_rgba(250,204,21,0.5)] flex items-center gap-2"><i className="fa-solid fa-star"></i> NÍVEL {leveledUpTo} ALCANÇADO!</div></div>}
                  {gameMode === 'TIME_ATTACK' && timeLeft <= 0 ? (
                     <><div className="w-24 h-24 rounded-full flex items-center justify-center mb-6 bg-blue-500/20 text-blue-400 mt-6"><i className="fa-solid fa-stopwatch text-[48px]"></i></div><h2 className="text-3xl font-bold mb-2 text-blue-400">Tempo Esgotado!</h2><p className={`text-xl mb-8 ${theme.muted}`}>Obtiveste <strong className={theme.text}>{score} pontos</strong></p></>
                  ) : (
                     <><div className={`w-24 h-24 rounded-full flex items-center justify-center mb-6 relative mt-6 shadow-lg ${isCorrect ? 'bg-green-500/20 text-green-500 shadow-green-500/20' : 'bg-red-500/20 text-red-500 shadow-red-500/20'}`}><i className={`fa-solid ${isCorrect ? 'fa-check' : 'fa-delete-left'} text-[48px]`}></i></div><h2 className={`text-3xl font-bold mb-6 ${isCorrect ? 'text-green-500' : 'text-red-500'}`}>{isCorrect ? 'Excelente!' : 'Não foi desta vez'}</h2></>
                  )}
                  <div className={`${theme.card} ${theme.border} w-full rounded-2xl p-6 mb-6 space-y-4 shadow-inner`}>
                    <div className={`flex justify-between items-center border-b ${theme.border} pb-4`}><span className={`text-sm uppercase tracking-wider ${theme.muted}`}>Número real</span><span className="text-2xl font-bold tracking-widest">{targetNumber || '---'}</span></div>
                    {gameMode === 'REVERSE' && targetNumber && <div className={`flex justify-between items-center border-b ${theme.border} pb-4 pt-2`}><span className={`text-sm uppercase tracking-wider ${theme.muted}`}>Invertido</span><span className="text-2xl font-bold tracking-widest text-orange-400">{targetNumber.split('').reverse().join('')}</span></div>}
                    <div className="flex justify-between items-center pt-2"><span className={`text-sm uppercase tracking-wider ${theme.muted}`}>A tua resposta</span><span className={`text-2xl font-bold tracking-widest ${isCorrect ? 'text-green-500' : 'text-red-500 line-through'}`}>{userInput || '---'}</span></div>
                  </div>
                  <button onClick={() => startRound(gameMode === 'TIME_ATTACK' || !isCorrect, difficulty)} className={`w-full font-bold py-4 px-8 rounded-2xl text-lg flex items-center justify-center gap-2 transition-all active:scale-95 touch-manipulation shadow-lg ${theme.primary} ${theme.primaryActive} ${theme.btnText}`}>{gameMode === 'TIME_ATTACK' && timeLeft <= 0 ? 'Jogar Novamente' : (isCorrect ? 'Próxima Ronda' : 'Tentar Novamente')} <i className="fa-solid fa-rotate-left text-[20px]"></i></button>
                </div>
              )}
            </div>
          );
        }

        const startApp = () => {
            if (window.FirebaseAPI) {
                initFirebase();
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } else {
                setTimeout(startApp, 50);
            }
        };
        startApp();
    </script>
</body>
</html>
